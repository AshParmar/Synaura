# .github/workflows/backend.yml
# CI/CD pipeline for the Synaura FastAPI backend
#
# Triggers: push or PR to `main`
# Jobs:
#   1. lint   — ruff linting
#   2. test   — pytest (unit tests in /tests)
#   3. docker — build Docker image & push to GCR
#   4. deploy — deploy to Google Cloud Run (main branch only)
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID
#   GCP_SA_KEY          ← base64-encoded service account JSON with Cloud Run & GCR permissions
#   GROQ_API_KEY
#   PINECONE_API_KEY
#   MONGODB_URI

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "database/**"
      - "vector_store/**"
      - "cloud/**"
      - "docker/**"
      - "requirements.txt"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  REGION: us-central1
  SERVICE_NAME: synaura-backend

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ database/ vector_store/ cloud/ --ignore F401,F841,E741,E702,F541,E402

  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install system dependencies (OpenCV)
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install dependencies
        run: pip install -r requirements.txt -e .
      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short

  # ── 3. Docker Build & Push ───────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/synaura-repo/${{ env.SERVICE_NAME }}"
          docker build -f docker/Dockerfile -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  # ── 4. Deploy to Cloud Run ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/synaura-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --port=8000
            --memory=2Gi
            --cpu=2
            --max-instances=10
            --allow-unauthenticated
          env_vars: |
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            GCS_FAISS_BUCKET=${{ secrets.GCS_FAISS_BUCKET }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
